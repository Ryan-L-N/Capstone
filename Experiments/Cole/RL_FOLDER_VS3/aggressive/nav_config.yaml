# Navigation Policy Training Configuration - AGGRESSIVE VARIANT
# Learning Rate: 3.0e-4 (fast, aggressive learning)

# Environment geometry
arena:
  radius: 25.0
  center: [0.0, 0.0]
  obstacle_buffer: 2.0

# Robot initial state
robot:
  start_position: [0.0, 0.0, 0.7]
  start_orientation: [1.0, 0.0, 0.0, 0.0]
  fall_threshold: 0.25

# Action space
action:
  vx_range: [-0.5, 5.0]
  vy_range: [-0.5, 0.5]
  omega_range: [-1.5, 1.5]

# Observation space
observation:
  obstacle_rays: 18
  obstacle_ray_length: 5.0
  use_stage_encoding: true
  hierarchical_mode_enabled: true
  turn_threshold_rad: 0.3

# Waypoint settings
waypoints:
  total_count: 25
  capture_radius: 0.25
  boundary_margin: 2.0

# Obstacle settings
obstacles:
  light_max_mass: 0.45
  medium_max_mass: 32.7
  heavy_min_mass: 65.4
  small_static_size: [0.043, 0.102]
  clearance_waypoint: 5.0
  clearance_boundary: 3.0

# Scoring system
scoring:
  initial_points: 300.0
  time_decay_per_sec: 1.0
  waypoint_bonus: 15.0

# RL Reward weights
reward:
  time_penalty: 0.0
  waypoint_capture: 50.0
  timeout_penalty: -500.0
  progress_shaping: 15.0
  distance_reward: 0.0
  heading_reward: 0.2
  speed_reward_tier_1_threshold: 0.9
  speed_reward_tier_2_threshold: 1.79
  speed_reward_tier_2_per_meter: 0.25
  speed_reward_tier_3_per_meter: 0.50
  lateral_velocity_penalty: 0.25
  cross_track_error_weight: 0.4
  static_turn_reward: 0.1
  fall_penalty: -500.0
  boundary_penalty: -5.0
  collision_penalty: -100.0
  min_safe_distance: 0.5
  obstacle_clearance_penalty: -1.0
  efficiency_bonus_weight: 2.0

# Curriculum stages
curriculum:
  success_window: 100
  success_threshold: 0.80

  stages:
    - id: 1
      name: "Waypoints 5m without obstacles"
      max_time: null
      waypoint_distance_first: 5.0
      waypoint_distance_subsequent: 5.0
      obstacles_light_coverage: 0.0
      obstacles_heavy_coverage: 0.0
      obstacles_small_coverage: 0.0
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 2
      name: "Waypoints 10m with 1% coverage"
      max_time: null
      waypoint_distance_first: 10.0
      waypoint_distance_subsequent: 10.0
      obstacles_light_coverage: 0.01
      obstacles_heavy_coverage: 0.01
      obstacles_small_coverage: 0.01
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 3
      name: "Waypoints 20m with 2% coverage"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 20.0
      obstacles_light_coverage: 0.02
      obstacles_heavy_coverage: 0.02
      obstacles_small_coverage: 0.02
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 4
      name: "Waypoints 20m then 40m 3% coverage"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.03
      obstacles_heavy_coverage: 0.03
      obstacles_small_coverage: 0.03
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 5
      name: "Waypoints 20m then 40m 4% coverage"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.04
      obstacles_heavy_coverage: 0.04
      obstacles_small_coverage: 0.04
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80

    - id: 6
      name: "Waypoints 20m then 40m 5% coverage"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.05
      obstacles_heavy_coverage: 0.05
      obstacles_small_coverage: 0.05
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80

# PPO hyperparameters - AGGRESSIVE: High learning rate
ppo:
  learning_rate: 3.0e-4
  clip_param: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  target_kl: 0.015
  ppo_epochs: 10
  
# Network architecture
network:
  hidden_dims: [256, 256, 128]
  activation: "relu"
  action_std: 0.3

# Training settings
training:
  steps_per_iteration: 6000
  checkpoint_frequency: 50
  log_frequency: 1
  
# Physics/rendering
physics:
  dt: 0.002
  rendering_dt: 0.02
  control_hz: 20
