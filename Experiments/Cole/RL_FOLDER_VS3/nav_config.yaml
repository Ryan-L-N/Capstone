# Navigation Policy Training Configuration - RL_FOLDER_VS3
# 7-Stage Curriculum: 2 Stability + 1 Pushing + 4 Navigation
# Multi-Sensor Fusion: Raycasts (3 heights) + IMU + Contact + Proprioception
# Observation Space: 75 dimensions

# Environment geometry
arena:
  radius: 25.0  # meters (50m diameter)
  center: [0.0, 0.0]
  obstacle_buffer: 2.0  # no obstacles within 2m of start

# Robot initial state
robot:
  start_position: [0.0, 0.0, 0.7]
  start_orientation: [1.0, 0.0, 0.0, 0.0]  # quaternion [w,x,y,z]
  fall_threshold: 0.25  # z-height below which robot has fallen

# Action space (velocity commands to SpotFlatTerrainPolicy)
action:
  vx_range: [-0.5, 5.0]  # forward/back velocity (m/s)
  vy_range: [-0.5, 0.5]  # left/right strafe (m/s)
  omega_range: [-1.5, 1.5]  # turning rate (rad/s)

# Observation space  
observation:
  obstacle_rays: 16  # raycasts around robot
  obstacle_ray_length: 5.0  # meters
  use_stage_encoding: true  # one-hot stage encoding (7 stages)

# Waypoint settings
waypoints:
  total_count: 25
  capture_radius: 0.5  # meters
  boundary_margin: 2.0  # keep waypoints inside arena by this margin

# Obstacle settings (reuse from Baseline_Environment.py)
obstacles:
  light_max_mass: 0.45  # kg (pushable)
  medium_max_mass: 32.7  # kg (Spot's mass, pushable with effort)
  heavy_min_mass: 65.4  # kg (immovable, static)
  small_static_size: [0.043, 0.102]  # meters [min, max]
  clearance_waypoint: 5.0  # meters
  clearance_boundary: 3.0  # meters

# Scoring system (internal game logic)
scoring:
  initial_points: 300.0
  time_decay_per_sec: 1.0
  waypoint_bonus: 25.0

# RL Reward weights (OPTIMIZED FOR VS3)
reward:
  time_penalty: 0.0  # time decay in score is sufficient
  waypoint_capture: 25.0  # reward for each captured waypoint (increased from 15.0)
  timeout_penalty: -100.0  # penalty if score reaches 0
  progress_shaping: 10.0  # alpha for distance-based shaping (no penalty multiplier)
  distance_reward: 0.0  # disabled
  heading_reward: 0.2  # reward for facing waypoint (applies throughout approach)
  speed_reward: 0.3  # reward for fast movement when path clear
  wrong_direction_penalty: 0.0  # REMOVED - no penalty multiplier
  fall_penalty: -100.0  # INCREASED from -50 (doubled)
  boundary_penalty: -5.0  # penalty for leaving arena
  stillness_penalty: -1  # NEW: penalty per timestep for not moving (forces locomotion learning)

# 7-Stage Curriculum (Stability -> Pushing -> Navigation Progression)
curriculum:
  success_window: 100  # episodes
  success_threshold: 0.80  # 80% success rate to advance

  stages:
    # Stage 1: Baseline - Random walking with all obstacle types
    - id: 1
      name: "Stability Foundation"
      max_time: 180.0  # seconds
      waypoint_distance_first: null  # no waypoints
      waypoint_distance_subsequent: null
      obstacles_light_coverage: 0.05  # 5% light obstacles
      obstacles_heavy_coverage: 0.05  # 5% heavy obstacles
      obstacles_small_coverage: 0.05  # 5% small obstacles
      use_progress_shaping: false
      success_criterion: "Remain stable for 60s without falling"
      
    # Stage 2: Stability with increased obstacles
    - id: 2
      name: "Enhanced Stability"
      max_time: 180.0  # seconds
      waypoint_distance_first: null  # no waypoints
      waypoint_distance_subsequent: null
      obstacles_light_coverage: 0.10  # 10% light obstacles
      obstacles_heavy_coverage: 0.10  # 10% heavy obstacles
      obstacles_small_coverage: 0.10  # 10% small obstacles
      use_progress_shaping: false
      success_criterion: "Remain stable for 180s with increased obstacle density"
      
    # Stage 3: Object Pushing Training
    - id: 3
      name: "Object Pushing Training"
      max_time: 300.0  # 5 minutes
      waypoint_distance_first: null  # no waypoints
      waypoint_distance_subsequent: null
      obstacles_light_coverage: 0.10  # 10% light obstacles (same as Stage 2)
      obstacles_heavy_coverage: 0.10  # 10% heavy obstacles (same as Stage 2)
      obstacles_small_coverage: 0.10  # 10% small obstacles (same as Stage 2)
      use_progress_shaping: false
      success_criterion: "Find and push 5 different lightweight objects at least 1m each"
      target_objects_count: 5
      target_push_distance: 1.0
      
    # Stage 4: Short-range waypoint navigation with light obstacles
    - id: 4
      name: "Short-Range Navigation"
      max_time: null  # no time limit
      waypoint_distance_first: 5.0
      waypoint_distance_subsequent: 5.0
      obstacles_light_coverage: 0.10  # 10% light obstacles
      obstacles_heavy_coverage: 0.10  # 10% heavy obstacles
      obstacles_small_coverage: 0.10  # 10% small obstacles
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints at 5m intervals"
      
    # Stage 5: Medium-range with mixed obstacles
    - id: 5
      name: "Medium-Range Navigation"
      max_time: null
      waypoint_distance_first: 10.0
      waypoint_distance_subsequent: 10.0
      obstacles_light_coverage: 0.10  # 10% light
      obstacles_heavy_coverage: 0.10  # 10% heavy
      obstacles_small_coverage: 0.10  # 10% small
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints at 10m intervals with mixed obstacles"
      
    # Stage 6: Long-range with dense obstacles
    - id: 6
      name: "Long-Range with Dense Obstacles"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 20.0
      obstacles_light_coverage: 0.10  # 10% light
      obstacles_heavy_coverage: 0.10  # 10% heavy
      obstacles_small_coverage: 0.10  # 10% small
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints at 20m intervals with dense obstacles"
      
    # Stage 7: Maximum Difficulty - Variable distance + full obstacle suite
    - id: 7
      name: "Expert Navigation"
      max_time: null
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.10  # 10% light
      obstacles_heavy_coverage: 0.10  # 10% heavy
      obstacles_small_coverage: 0.10  # 10% small
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints with variable distance and maximum obstacles - TRAINING COMPLETE"

# PPO hyperparameters
ppo:
  learning_rate: 1.0e-4
  clip_param: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  target_kl: 0.015
  ppo_epochs: 10
  
# Network architecture
network:
  hidden_dims: [256, 256, 128]
  activation: "relu"
  action_std: 0.3  # fixed std for Gaussian policy

# Training settings
training:
  steps_per_iteration: 6000
  checkpoint_frequency: 50
  log_frequency: 1
  
# Physics/rendering
physics:
  dt: 0.002  # 500 Hz
  rendering_dt: 0.02  # 50 Hz
  control_hz: 20  # policy runs at 20 Hz
