# Navigation Policy Training Configuration
# Hierarchical RL: High-level navigation + low-level SpotFlatTerrainPolicy

# Environment geometry
arena:
  radius: 25.0  # meters (50m diameter)
  center: [0.0, 0.0]
  obstacle_buffer: 2.0  # no obstacles within 2m of start

# Robot initial state
robot:
  start_position: [0.0, 0.0, 0.7]
  start_orientation: [1.0, 0.0, 0.0, 0.0]  # quaternion [w,x,y,z]
  fall_threshold: 0.25  # z-height below which robot has fallen

# Action space (velocity commands to SpotFlatTerrainPolicy)
action:
  vx_range: [-0.5, 5.0]  # forward/back velocity (m/s)
  vy_range: [-0.5, 0.5]  # left/right strafe (m/s)
  omega_range: [-1.5, 1.5]  # turning rate (rad/s)

# Observation space
observation:
  obstacle_rays: 18  # raycasts around robot
  obstacle_ray_length: 5.0  # meters
  use_stage_encoding: true  # one-hot stage encoding
  # Hierarchical control settings
  hierarchical_mode_enabled: true
  turn_threshold_rad: 0.3  # ~17 degrees - angle error threshold for turn mode

# Waypoint settings
waypoints:
  total_count: 25
  capture_radius: 0.25  # meters
  boundary_margin: 2.0  # keep waypoints inside arena by this margin

# Obstacle settings (reuse from Baseline_Environment.py)
obstacles:
  light_max_mass: 0.45  # kg (pushable)
  medium_max_mass: 32.7  # kg (Spot's mass, pushable with effort)
  heavy_min_mass: 65.4  # kg (immovable, static)
  small_static_size: [0.043, 0.102]  # meters [min, max]
  clearance_waypoint: 5.0  # meters
  clearance_boundary: 3.0  # meters

# Scoring system (internal game logic)
scoring:
  initial_points: 300.0
  time_decay_per_sec: 1.0
  waypoint_bonus: 15.0

# RL Reward weights
reward:
  time_penalty: 0.0  # REMOVED - time decay in score is sufficient
  waypoint_capture: 50.0  # Reward for capturing each waypoint (score gets +15, reward gets +50)
  timeout_penalty: -500.0  # Penalty if robot runs out of score points (reaches 0)
  progress_shaping: 15.0  # alpha for distance-based shaping - restored with hardcoded safety layer
  distance_reward: 0.0  # DISABLED - no reward just for proximity to waypoint
  heading_reward: 0.2  # reward for facing toward waypoint - reduced 80%
  # Distance-based speed reward tiers (replaces old speed_reward: 0.3)
  speed_reward_tier_1_threshold: 0.9    # 2 mph threshold (m/s) - below this: no reward
  speed_reward_tier_2_threshold: 1.79   # 4 mph threshold (m/s) - above this: higher tier
  speed_reward_tier_2_per_meter: 0.25   # reward per meter at tier 2 (0.9-1.79 m/s)
  speed_reward_tier_3_per_meter: 0.50   # reward per meter at tier 3 (≥1.79 m/s)
  lateral_velocity_penalty: 0.25  # penalty for strafe (left/right) motion to prevent drift
  cross_track_error_weight: 0.4  # penalty for deviating left/right from ideal path to waypoint
  static_turn_reward: 0.1  # reduced from 0.5 to prevent spinning local optimum
  fall_penalty: -1000.0
  boundary_penalty: -5.0  # if leaving arena
  
  # LiDAR-based obstacle avoidance (Stages with obstacles)
  collision_penalty: -8.0  # One-time penalty on collision entry (per-event, not per-step)
  collision_contact_penalty: -1.5  # Per-step cost while robot remains in contact with obstacle
  min_safe_distance: 0.5  # Minimum safe distance from obstacles (meters)
  obstacle_clearance_penalty: -2.0  # Penalty per meter below min_safe_distance when obstacle is detected
  obstacle_avoidance_bonus: 0.0  # DISABLED - hardcoded safety layer replaces reward-based avoidance
  decel_reward_weight: 1.0  # Weight for deceleration reward near waypoints (within 5m)
  
  # Efficiency bonus (completing waypoints before score expires)
  efficiency_bonus_weight: 1.0    # Multiplier on remaining score when waypoint captured (higher = stronger incentive to finish fast)

# Curriculum stages
curriculum:
  success_window: 100 # episodes
  success_threshold: 0.80  # 80% success rate to advance (40 of 50 episodes)

  stages:
    - id: 1
      name: "Waypoints 5m without obstacles"
      max_time: null  # NO TIME LIMIT - episode ends only when all waypoints captured or fall
      waypoint_distance_first: 5.0
      waypoint_distance_subsequent: 5.0
      obstacles_light_coverage: 0.0
      obstacles_heavy_coverage: 0.0
      obstacles_small_coverage: 0.0
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100  # episodes for stage 2+ (reset to 100)
      success_threshold: 0.80  # 80% success (80 of 100)
      
    - id: 2
      name: "Waypoints 10m with 1% coverage"
      max_time: null  # NO TIME LIMIT
      waypoint_distance_first: 10.0
      waypoint_distance_subsequent: 10.0
      obstacles_light_coverage: 0.01  # 1% light obstacles
      obstacles_heavy_coverage: 0.01  # 1% heavy obstacles
      obstacles_small_coverage: 0.01  # 1% small static obstacles
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 3
      name: "Waypoints 20m with 2% coverage"
      max_time: null  # NO TIME LIMIT
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 20.0
      obstacles_light_coverage: 0.02 # 2% light obstacles
      obstacles_heavy_coverage: 0.02 # 2% heavy obstacles
      obstacles_small_coverage: 0.02 # 2% small static obstacles
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 4
      name: "Waypoints 20m then 40m 3% coverage"
      max_time: null  # NO TIME LIMIT
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.03 # 3% light obstacles
      obstacles_heavy_coverage: 0.03 # 3% heavy obstacles
      obstacles_small_coverage: 0.03 # 3% small static obstacles
      use_progress_shaping: true
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80
      
    - id: 5
      name: "Waypoints 20m then 40m 4% total obstacles ground coverage"
      max_time: null  # NO TIME LIMIT
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.04  #4% of arena
      obstacles_heavy_coverage: 0.04  #4% of arena
      obstacles_small_coverage: 0.04  #4% of arena
      use_progress_shaping: true  # small progress shaping reward
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80

    - id: 6
      name: "Waypoints 20m then 40m 5% total obstacles ground coverage"
      max_time: null  # NO TIME LIMIT
      waypoint_distance_first: 20.0
      waypoint_distance_subsequent: 40.0
      obstacles_light_coverage: 0.05  #5% of arena
      obstacles_heavy_coverage: 0.05  #5% of arena
      obstacles_small_coverage: 0.05  #5% of arena
      use_progress_shaping: true  # small progress shaping reward
      success_criterion: "Capture all 25 waypoints"
      success_window: 100
      success_threshold: 0.80

# PPO hyperparameters (root config - matches moderate variant)
ppo:
  learning_rate: 1.0e-4  # Moderate baseline (see variant configs for aggressive/conservative)
  clip_param: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  target_kl: 0.015  # Early stopping if KL divergence exceeds this (prevents catastrophic updates)
  ppo_epochs: 10  # Number of epochs to train on each batch (full batch per epoch)
  
# Network architecture
network:
  hidden_dims: [256, 256, 128]  # MLP layers
  activation: "relu"
  action_std: 0.3  # fixed std for Gaussian policy

# Training settings
training:
  steps_per_iteration: 6000  # steps to collect before PPO update (6000/20Hz = 300s, matches score timeout)
  checkpoint_frequency: 50  # save every N iterations
  log_frequency: 1  # log every iteration
  
# Physics/rendering
physics:
  dt: 0.002  # 500 Hz (1/500)
  rendering_dt: 0.02  # 50 Hz (1/50)
  control_hz: 20  # high-level policy runs at 20 Hz
